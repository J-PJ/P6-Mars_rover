services:
  yolo-realsense:
    build: .
    runtime: nvidia
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./models:/app/models
      - ./output:/app/output
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped
